<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 120">
  <!-- D.E.A.L est. MMXXVI · Tây Hồ · Hà Nội — horizontal eyebrow line -->
  <!-- Use as: email signature banner, ribbon, footer of newsletters, business-card line -->

  <rect width="1600" height="120" fill="#1E2022"/>

  <!-- Thin top + bottom rules -->
  <rect x="0" y="20" width="1600" height="0.5" fill="#C9A96E" opacity="0.30"/>
  <rect x="0" y="100" width="1600" height="0.5" fill="#C9A96E" opacity="0.30"/>

  <!-- The line -->
  <text x="800" y="78"
    text-anchor="middle"
    font-family="'IBM Plex Mono', monospace"
    font-weight="400"
    font-size="32"
    letter-spacing="14"
    fill="#C9A96E"
    opacity="0.85">EST. MMXXVI  ·  TÂY HỒ  ·  HÀ NỘI</text>
</svg>
