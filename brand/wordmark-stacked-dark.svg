<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280">
  <!-- D.E.A.L Realty Hub Coffee — stacked wordmark for square layouts (Instagram posts, profile pic) -->

  <rect width="240" height="280" fill="#1E2022"/>

  <!-- D Mark — centered, larger -->
  <g transform="translate(60, 30)">
    <rect width="120" height="120" rx="16" fill="#1E2022"/>
    <path fill-rule="evenodd" clip-rule="evenodd"
      d="M21.6 16.8 L21.6 103.2 L57.6 103.2 Q98.4 103.2 98.4 60 Q98.4 16.8 57.6 16.8 Z
         M38.4 31.2 L57.6 31.2 Q84 31.2 84 60 Q84 88.8 57.6 88.8 L38.4 88.8 Z"
      fill="#C9A96E"/>
    <rect x="38.4" y="53.4" width="45.6" height="1.8" rx="1.2" fill="#D44332"/>
    <rect x="38.4" y="55.2" width="45.6" height="9.6"  rx="1.2" fill="#4F9E6E"/>
    <rect x="38.4" y="64.8" width="45.6" height="1.8" rx="1.2" fill="#D44332"/>
  </g>

  <!-- D.E.A.L wordmark — below D mark -->
  <text x="120" y="200"
    text-anchor="middle"
    font-family="'Orbitron', 'Courier New', monospace"
    font-weight="900"
    font-size="34"
    letter-spacing="5"
    fill="#C9A96E">D.E.A.L</text>

  <!-- Thin separator line -->
  <rect x="100" y="218" width="40" height="0.75" fill="#C9A96E" opacity="0.4"/>

  <!-- REALTY HUB COFFEE subtitle -->
  <text x="120" y="240"
    text-anchor="middle"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-weight="400"
    font-size="9"
    letter-spacing="4"
    fill="#4F9E6E"
    opacity="0.85">REALTY HUB COFFEE</text>

  <!-- Tay Ho location -->
  <text x="120" y="258"
    text-anchor="middle"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-weight="300"
    font-size="7"
    letter-spacing="3"
    fill="#F0EDE8"
    opacity="0.4">TAY HO · HANOI · EST. MMXXVI</text>
</svg>
